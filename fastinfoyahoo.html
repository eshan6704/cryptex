<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastInfo — Market Overview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #1e3a5f;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 22px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .subtitle {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        .header .live-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .timestamp-bar {
            background: #0f172a;
            padding: 8px 30px;
            font-size: 11px;
            color: #475569;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .timestamp-bar span { color: #94a3b8; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Segment Cards */
        .segment {
            background: #111827;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid #1e293b;
            transition: border-color 0.2s;
        }
        .segment:hover { border-color: #334155; }
        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: #1a2235;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .segment-header:hover { background: #1e293b; }
        .segment-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .segment-title .icon { font-size: 18px; }
        .segment-title h2 {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .segment-title .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #1e293b;
            color: #64748b;
            border: 1px solid #334155;
        }
        .segment-title .badge.live {
            background: #064e3b;
            color: #6ee7b7;
            border-color: #059669;
        }
        .segment-title .badge.cached {
            background: #451a03;
            color: #fdba74;
            border-color: #92400e;
        }
        .segment-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .last-updated {
            font-size: 11px;
            color: #475569;
        }
        .count-badge {
            font-size: 11px;
            color: #64748b;
            background: #0f172a;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* Buttons */
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-refresh {
            background: #2563eb;
            color: white;
        }
        .btn-refresh:hover { background: #1d4ed8; }
        .btn-refresh:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-refresh.spinning::after {
            content: "";
            width: 12px;
            height: 12px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-all {
            background: #7c3aed;
            color: white;
            padding: 8px 18px;
            font-size: 13px;
        }
        .btn-all:hover { background: #6d28d9; }

        /* Segment Body */
        .segment-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease;
        }
        .segment-body.open {
            max-height: 3000px;
            padding: 16px 20px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
        }
        .card {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px 14px;
            border: 1px solid #1e293b;
            transition: all 0.2s;
            position: relative;
        }
        .card:hover {
            border-color: #3b82f6;
            transform: translateY(-1px);
        }
        .card .symbol {
            font-size: 12px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .card .price {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            font-family: 'SF Mono', monospace;
        }
        .card .change {
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card .change.up { color: #22c55e; }
        .card .change.down { color: #ef4444; }
        .card .change.neutral { color: #64748b; }
        .card .currency {
            font-size: 9px;
            color: #475569;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .card.failed {
            opacity: 0.4;
            border-color: #450a0a;
        }
        .card.failed::after {
            content: "N/A";
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 9px;
            color: #7f1d1d;
            background: #450a0a;
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #1e293b;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        .error {
            background: #450a0a;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            border: 1px solid #7f1d1d;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #475569;
            font-size: 13px;
        }

        /* Floating refresh button */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; align-items: flex-start; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .segment-actions { gap: 6px; }
            .last-updated { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📊 FastInfo Market Overview</h1>
            <div class="subtitle">
                <span class="live-dot"></span> Background refresh every 1h
                • Click segment to expand • Hit refresh for live data
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-all" onclick="refreshAll()" id="btn-all">
                🔄 Refresh All
            </button>
        </div>
    </div>

    <div class="timestamp-bar">
        <span id="ts-snapshot">Snapshot: loading...</span>
        <span id="ts-groups">Groups: loading...</span>
    </div>

    <div class="container" id="container">
        <div class="loading">
            <div class="loading-spinner"></div>
            Loading market snapshot...
        </div>
    </div>

<script>
// ─────────────────────────── CONFIG ───────────────────────────
const API_BASE = window.location.origin;

const GROUP_CONFIG = {
    global_indices:   { icon: "🌍", label: "Global Indices",      desc: "Major world indices" },
    indian_indices:   { icon: "🇮🇳", label: "Indian Indices",      desc: "NSE/BSE sectoral indices" },
    nifty50_stocks:   { icon: "📈", label: "Nifty 50 Stocks",     desc: "Nifty 50 constituents" },
    commodities:      { icon: "🛢️", label: "Commodities",         desc: "Metals, energy, agri" },
    forex_major:      { icon: "💱", label: "Forex Major",         desc: "Major currency pairs" },
    forex_emerging:   { icon: "💰", label: "Forex Emerging",      desc: "Emerging market FX" },
    bonds:            { icon: "📉", label: "Bonds & Yields",      desc: "Treasury yields" },
    crypto:           { icon: "🪙", label: "Crypto",              desc: "Top cryptocurrencies" },
};

// ─────────────────────────── STATE ───────────────────────────
let snapshotData = {};
let openSegments = new Set();
let isRefreshingAll = false;

// ─────────────────────────── LOAD ───────────────────────────
async function loadSnapshot() {
    try {
        const res = await fetch(`${API_BASE}/fastinfo/snapshot`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        snapshotData = await res.json();
        render();
        updateTimestamp();
    } catch (e) {
        document.getElementById("container").innerHTML =
            `<div class="error">Failed to load snapshot: ${e.message}<br>Try refreshing.</div>`;
    }
}

function updateTimestamp() {
    const meta = snapshotData._meta;
    const elSnap = document.getElementById("ts-snapshot");
    const elGroups = document.getElementById("ts-groups");

    if (meta && meta.updated_at) {
        const d = new Date(meta.updated_at);
        elSnap.textContent = `Snapshot: ${d.toLocaleString()}`;
    }

    const groups = Object.keys(GROUP_CONFIG).filter(g => snapshotData[g]);
    elGroups.textContent = `Groups: ${groups.length} loaded`;
}

// ─────────────────────────── RENDER ───────────────────────────
function render() {
    const container = document.getElementById("container");
    container.innerHTML = "";

    for (const [group, config] of Object.entries(GROUP_CONFIG)) {
        const groupData = snapshotData[group];
        if (!groupData) continue;

        const isOpen = openSegments.has(group);
        const isLive = !!groupData.refreshed_at;
        const lastUpdated = groupData.refreshed_at || snapshotData._meta?.updated_at;
        const failedCount = (groupData.failed || []).length;
        const okCount = groupData.fetched || 0;
        const totalCount = groupData.count || 0;

        const segment = document.createElement("div");
        segment.className = "segment";
        segment.innerHTML = `
            <div class="segment-header" onclick="toggleSegment('${group}')">
                <div class="segment-title">
                    <span class="icon">${config.icon}</span>
                    <h2>${config.label}</h2>
                    <span class="badge ${isLive ? 'live' : 'cached'}">
                        ${isLive ? '● LIVE' : '○ Cached'}
                    </span>
                </div>
                <div class="segment-actions">
                    <span class="count-badge">${okCount}/${totalCount}</span>
                    <span class="last-updated">${lastUpdated ? timeAgo(lastUpdated) : ''}</span>
                    <button class="btn btn-refresh" id="btn-${group}"
                        onclick="event.stopPropagation(); refreshGroup('${group}')">
                        🔄 Refresh
                    </button>
                </div>
            </div>
            <div class="segment-body ${isOpen ? 'open' : ''}" id="body-${group}">
                ${renderGrid(groupData.data, groupData.failed)}
            </div>
        `;
        container.appendChild(segment);
    }
}

function renderGrid(data, failed = []) {
    if (!data) return '<div class="empty">No data available</div>';
    const failedSet = new Set(failed);

    let html = '<div class="grid">';
    for (const [sym, info] of Object.entries(data)) {
        const isFailed = failedSet.has(sym);
        const changeClass = info.change_pct > 0 ? 'up' : info.change_pct < 0 ? 'down' : 'neutral';
        const sign = info.change_pct > 0 ? '+' : '';
        const arrow = info.change_pct > 0 ? '▲' : info.change_pct < 0 ? '▼' : '−';

        html += `
            <div class="card ${isFailed ? 'failed' : ''}">
                <div class="symbol">${sym}</div>
                <div class="price">${isFailed ? '—' : info.price.toLocaleString()}</div>
                <div class="change ${changeClass}">
                    ${arrow} ${sign}${info.change_pct}%
                </div>
                <div class="currency">${info.currency || 'USD'}</div>
            </div>
        `;
    }
    html += '</div>';
    return html;
}

function toggleSegment(group) {
    const body = document.getElementById(`body-${group}`);
    if (openSegments.has(group)) {
        openSegments.delete(group);
        body.classList.remove("open");
    } else {
        openSegments.add(group);
        body.classList.add("open");
    }
}

// ─────────────────────────── REFRESH ───────────────────────────
async function refreshGroup(group) {
    const btn = document.getElementById(`btn-${group}`);
    if (btn.disabled) return;

    btn.disabled = true;
    btn.classList.add("spinning");
    btn.textContent = "Refreshing...";

    try {
        const res = await fetch(`${API_BASE}/fastinfo/refresh/${group}`, { method: "POST" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Update snapshot
        snapshotData[group] = {
            data: data.data,
            failed: data.failed,
            count: data.total,
            fetched: data.fetched,
            refreshed_at: new Date().toISOString(),
        };

        // Re-render this segment
        const body = document.getElementById(`body-${group}`);
        body.innerHTML = renderGrid(data.data, data.failed);

        // Update header
        const header = btn.closest(".segment-header");
        const badge = header.querySelector(".badge");
        badge.textContent = "● LIVE";
        badge.classList.remove("cached");
        badge.classList.add("live");

        const count = header.querySelector(".count-badge");
        count.textContent = `${data.fetched}/${data.total}`;

        const ts = header.querySelector(".last-updated");
        ts.textContent = "just now";

        updateTimestamp();

    } catch (e) {
        alert(`Refresh failed for ${group}: ${e.message}`);
    } finally {
        btn.disabled = false;
        btn.classList.remove("spinning");
        btn.textContent = "🔄 Refresh";
    }
}

async function refreshAll() {
    const btn = document.getElementById("btn-all");
    if (isRefreshingAll) return;
    isRefreshingAll = true;
    btn.disabled = true;
    btn.textContent = "⟳ Refreshing All...";

    try {
        const res = await fetch(`${API_BASE}/fastinfo/refresh-all`, { method: "POST" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await loadSnapshot();
    } catch (e) {
        alert(`Refresh all failed: ${e.message}`);
    } finally {
        isRefreshingAll = false;
        btn.disabled = false;
        btn.textContent = "🔄 Refresh All";
    }
}

// ─────────────────────────── UTILS ───────────────────────────
function timeAgo(isoString) {
    const then = new Date(isoString);
    const now = new Date();
    const sec = Math.floor((now - then) / 1000);
    if (sec < 60) return "just now";
    if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
    if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
    return `${Math.floor(sec/86400)}d ago`;
}

// ─────────────────────────── INIT ───────────────────────────
loadSnapshot();
// Auto-reload snapshot every 5 minutes
setInterval(loadSnapshot, 5 * 60 * 1000);
</script>
</body>
</html>
